<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ЛидПоток: Китай</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #fff);
            --text: var(--tg-theme-text-color, #000);
            --hint: var(--tg-theme-hint-color, #999);
            --button: var(--tg-theme-button-color, #3390ec);
            --button-text: var(--tg-theme-button-text-color, #fff);
            --secondary-bg: var(--tg-theme-secondary-bg-color, #f1f1f1);
            --success: #4cd964;
            --warning: #ff9500;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 16px;
            padding-bottom: 90px;
            line-height: 1.5;
        }
        .screen { display: none; animation: fadeIn 0.3s; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .header {
            text-align: center;
            padding: 15px 0;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--secondary-bg);
        }
        .logo { font-size: 22px; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .flag { font-size: 20px; }
        .subtitle { color: var(--hint); font-size: 13px; margin-top: 4px; }
        
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--secondary-bg);
            border-radius: 10px;
            background: var(--secondary-bg);
            color: var(--text);
            font-size: 16px;
            outline: none;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--button); }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: var(--button);
            color: var(--button-text);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn:active { opacity: 0.9; }
        .btn-outline { background: transparent; border: 2px solid var(--button); color: var(--button); }
        .btn-success { background: var(--success); color: #fff; }
        .btn-warning { background: var(--warning); color: #fff; }
        .btn-reset { background: transparent; color: var(--hint); font-size: 14px; margin-top: 10px; }
        
        .lead-card {
            background: var(--secondary-bg);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 12px;
            border-left: 4px solid var(--success);
        }
        .lead-title { font-weight: 700; font-size: 16px; margin-bottom: 4px; }
        .lead-hot { 
            display: inline-block; 
            background: rgba(76, 217, 100, 0.15); 
            color: var(--success); 
            padding: 2px 8px; 
            border-radius: 6px; 
            font-size: 11px; 
            font-weight: 600; 
            margin-bottom: 8px; 
        }
        .lead-info { font-size: 13px; color: var(--hint); margin: 4px 0; }
        .lead-phone { 
            color: var(--button); 
            font-weight: 600; 
            text-decoration: none; 
            display: block; 
            margin: 8px 0; 
            font-size: 15px;
        }
        .lead-reason { 
            font-size: 13px; 
            margin-top: 10px; 
            padding-top: 10px; 
            border-top: 1px dashed var(--hint);
            background: rgba(51,144,236,0.08);
            padding: 8px 10px;
            border-radius: 6px;
        }
        .lead-reason b { color: var(--text); }
        
        .toolbar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: var(--bg);
            border-top: 1px solid var(--secondary-bg);
            padding: 10px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 100;
        }
        .toolbar .btn { margin: 0; font-size: 14px; padding: 12px; }
        
        .empty-state { text-align: center; padding: 40px 20px; color: var(--hint); }
        .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
        
        .filters-summary {
            background: var(--secondary-bg);
            padding: 10px 14px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-size: 13px;
        }
        .filters-summary b { color: var(--text); }
        
        .counter {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            margin: 10px 0;
            color: var(--button);
        }
    </style>
</head>
<body>

    <!-- ЭКРАН 1: Форма поиска клиентов -->
    <div id="screen-search" class="screen active">
        <div class="header">
            <div class="logo"><span class="flag">🇨🇳→🇷🇺</span> ЛидПоток: Китай</div>
            <div class="subtitle">Находи импортёров, которым нужна доставка</div>
        </div>
        
        <div class="form-group">
            <label>📦 Какие грузы ты возишь?</label>
            <select id="cargo_type">
                <option value="">Выберите...</option>
                <option value="одежда_текстиль">Одежда, текстиль, обувь</option>
                <option value="электроника">Электроника, гаджеты</option>
                <option value="оборудование">Станки, оборудование</option>
                <option value="товары_для_дома">Товары для дома, декор</option>
                <option value="автозапчасти">Автозапчасти</option>
                <option value="сырьё">Сырьё, материалы</option>
                <option value="любые">Любые грузы (универсал)</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>📍 В какие регионы РФ доставляешь?</label>
            <input type="text" id="regions" placeholder="Например: Москва, СПб, Краснодар...">
            <small style="color:var(--hint)">Можно несколько через запятую</small>
        </div>
        
        <div class="form-group">
            <label>📊 Минимальный объём (тонн)</label>
            <select id="min_volume">
                <option value="0">Любой (от 1 кг)</option>
                <option value="1">От 1 тонны</option>
                <option value="5">От 5 тонн</option>
                <option value="20">От 20 тонн (контейнер)</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>💡 Дополнительные пожелания (необязательно)</label>
            <textarea id="notes" rows="2" placeholder="Например: только растаможка, только доставка до склада..."></textarea>
        </div>
        
        <button class="btn" id="btn-find">🔍 Найти клиентов</button>
        <button class="btn btn-reset" id="btn-reset">🔄 Сбросить форму</button>
    </div>

    <!-- ЭКРАН 2: База горячих лидов -->
    <div id="screen-leads" class="screen">
        <div class="header">
            <div class="logo">🔥 Горячие лиды</div>
            <div class="subtitle" id="leads-date">Сгенерировано: <span id="current-time"></span></div>
        </div>
        
        <div class="filters-summary" id="filters-summary"></div>
        
        <div class="counter">Найдено: <span id="leads-count">0</span> компаний</div>
        
        <div id="leads-list">
            <div class="empty-state">
                <div class="icon">🔍</div>
                <p>Заполните форму, чтобы найти импортёров из Китая</p>
            </div>
        </div>
    </div>

    <!-- Панель действий -->
    <div class="toolbar" id="main-toolbar" style="display:none">
        <button class="btn btn-success" id="btn-download">📥 Скачать базу в Excel</button>
        <button class="btn btn-outline" id="btn-new">🔄 Новый поиск</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        const user = tg.initDataUnsafe.user || {};
        const userId = user.id || 'unknown';
        const userName = user.first_name || 'Логист';

        // Текущие лиды (для скачивания)
        let currentLeads = [];

        // --- Переключение экранов ---
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
            document.getElementById('main-toolbar').style.display = (id === 'leads') ? 'flex' : 'none';
        }

        // --- Сброс формы ---
        document.getElementById('btn-reset').addEventListener('click', () => {
            document.getElementById('cargo_type').value = '';
            document.getElementById('regions').value = '';
            document.getElementById('min_volume').value = '0';
            document.getElementById('notes').value = '';
            tg.showAlert('✅ Форма очищена');
        });

        // --- Поиск лидов ---
        document.getElementById('btn-find').addEventListener('click', () => {
            const cargo = document.getElementById('cargo_type').value;
            const regions = document.getElementById('regions').value.trim();
            const volume = document.getElementById('min_volume').value;
            const notes = document.getElementById('notes').value.trim();
            
            if (!cargo || !regions) {
                tg.showAlert('⚠️ Укажите тип груза и регион доставки');
                return;
            }
            
            // Отправляем запрос боту (для учёта/аналитики)
            tg.sendData(JSON.stringify({
                action: 'find_clients',
                user_id: userId,
                name: userName,
                cargo_type: cargo,
                regions: regions,
                min_volume: volume,
                notes: notes,
                timestamp: new Date().toISOString()
            }));
            
            // Генерируем демо-лиды (в реальности — запрос к твоему парсеру)
            currentLeads = generateDemoLeads(cargo, regions, volume);
            
            // Показываем результаты
            renderLeads(currentLeads, cargo, regions);
            showScreen('leads');
            
            // Обновляем время
            document.getElementById('current-time').textContent = new Date().toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});
        });

        // --- Генерация демо-лидов (импортёры из Китая) ---
        function generateDemoLeads(cargoType, regions, minVolume) {
            // В реальном приложении здесь будет запрос к твоему бэкенду/парсеру
            // Для демо — реалистичные примеры импортёров
            const allLeads = [
                {
                    company: 'ООО "Восток-Текстиль"',
                    contact: 'Анна, руководитель закупок',
                    phone: '+7 (495) 234-56-78',
                    city: 'Москва',
                    cargo: 'одежда_текстиль',
                    volume: '3-5 тонн/мес',
                    source: 'hh.ru (вакансия "Менеджер ВЭД Китай")',
                    reason: '<b>Горячий:</b> Ищут логиста для регулярных поставок одежды из Гуанчжоу. В вакансии указано "опыт работы с карго из Китая". Значит, уже возят и могут искать альтернативу.'
                },
                {
                    company: 'ИП Чжан Вэй (маркетплейсы)',
                    contact: 'Вячеслав, владелец',
                    phone: '+7 (926) 888-12-34',
                    city: 'Москва',
                    cargo: 'электроника',
                    volume: '1-3 тонны/мес',
                    source: 'Авито: "Ищу доставку с 1688"',
                    reason: '<b>Очень горячий:</b> Прямо сейчас ищет логиста для выкупа и доставки электроники. Первый груз — на следующей неделе. Конкуренция высокая — звонить срочно.'
                },
                {
                    company: 'ТД "СтанкоИмпорт-Юг"',
                    contact: 'Дмитрий, директор',
                    phone: '+7 (861) 555-90-12',
                    city: 'Краснодар',
                    cargo: 'оборудование',
                    volume: '10-20 тонн/мес',
                    source: '2ГИС + сайт компании',
                    reason: '<b>Тёплый:</b> Продают станки из Китая, на сайте указано "доставка под ключ", но логист — на аутсорсе. Возможна замена подрядчика.'
                },
                {
                    company: 'ООО "АвтоДеталь-Сибирь"',
                    contact: 'Елена, отдел ВЭД',
                    phone: '+7 (383) 111-22-33',
                    city: 'Новосибирск',
                    cargo: 'автозапчасти',
                    volume: '5-10 тонн/мес',
                    source: 'Telegram-чат "Импортёры Китая"',
                    reason: '<b>Горячий:</b> Вчера писали в чат: "Нужен надёжный логист на Ж/Д из Урумчи. Текущий срывает сроки". Идеальный момент для предложения.'
                },
                {
                    company: 'ИП Смирнов (товары для дома)',
                    contact: 'Алексей, владелец',
                    phone: '+7 (903) 444-55-66',
                    city: 'Екатеринбург',
                    cargo: 'товары_для_дома',
                    volume: 'до 1 тонны/мес',
                    source: 'Wildberries seller + 2ГИС',
                    reason: '<b>Тёплый:</b> Продаёт декор с пометкой "Китай", но не указывает логиста на сайте. Вероятно, возит через посредника — можно предложить прямую доставку.'
                },
                {
                    company: 'ООО "Сырьё-Трейд"',
                    contact: 'Ольга, логист',
                    phone: '+7 (495) 777-88-99',
                    city: 'Москва',
                    cargo: 'сырьё',
                    volume: '20+ тонн/мес',
                    source: 'Контур.Фокус + сайт',
                    reason: '<b>Тёплый:</b> Импортируют хим. сырьё из Китая. В открытых данных — частая смена логистических партнёров. Возможно, недовольны текущим.'
                }
            ];
            
            // Фильтрация по параметрам
            return allLeads.filter(lead => {
                const cargoMatch = cargoType === 'любые' || lead.cargo === cargoType;
                const regionMatch = regions.toLowerCase().split(',').some(r => 
                    lead.city.toLowerCase().includes(r.trim().toLowerCase())
                );
                return cargoMatch && regionMatch;
            });
        }

        // --- Отображение лидов ---
        function renderLeads(leads, cargo, regions) {
            const container = document.getElementById('leads-list');
            const countEl = document.getElementById('leads-count');
            const summaryEl = document.getElementById('filters-summary');
            
            // Показываем применённые фильтры
            const cargoNames = {
                'одежда_текстиль': 'Одежда и текстиль',
                'электроника': 'Электроника',
                'оборудование': 'Оборудование',
                'товары_для_дома': 'Товары для дома',
                'автозапчасти': 'Автозапчасти',
                'сырьё': 'Сырьё',
                'любые': 'Любые грузы'
            };
            summaryEl.innerHTML = `<b>Фильтры:</b> ${cargoNames[cargo] || cargo} | 📍 ${regions}`;
            
            countEl.textContent = leads.length;
            
            if (leads.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">😕</div>
                        <p>Пока нет лидов по этим параметрам</p>
                        <button class="btn btn-outline" style="margin-top:15px" onclick="showScreen('search')">Изменить поиск</button>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = leads.map((lead, idx) => `
                <div class="lead-card">
                    <span class="lead-hot">🔥 Горячий лид</span>
                    <div class="lead-title">${lead.company}</div>
                    <div class="lead-info">👤 ${lead.contact}</div>
                    <div class="lead-info">📍 ${lead.city} | 📦 ${lead.volume}</div>
                    <a href="tel:${lead.phone.replace(/\D/g,'')}" class="lead-phone">📞 ${lead.phone}</a>
                    <div class="lead-info">🔍 Источник: ${lead.source}</div>
                    <div class="lead-reason">${lead.reason}</div>
                </div>
            `).join('');
        }

        // --- Скачивание в Excel (CSV) ---
        document.getElementById('btn-download').addEventListener('click', () => {
            if (currentLeads.length === 0) {
                tg.showAlert('❌ Нет данных для скачивания');
                return;
            }
            
            // Формируем CSV с кириллицей (BOM для Excel)
            const BOM = '\uFEFF';
            const headers = ['Компания','Контакт','Телефон','Город','Груз','Объём','Источник','Почему горячий'];
            const rows = currentLeads.map(lead => [
                lead.company,
                lead.contact,
                lead.phone,
                lead.city,
                lead.cargo,
                lead.volume,
                lead.source,
                lead.reason.replace(/<[^>]*>/g, '') // убираем HTML-теги
            ]);
            
            const csv = [headers, ...rows]
                .map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(','))
                .join('\n');
                
            const blob = new Blob([BOM + csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Лиды_Китай_${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
            URL.revokeObjectURL(url);
            
            tg.showAlert(`✅ Скачано ${currentLeads.length} лидов!`);
            
            // Уведомляем бота о скачивании
            tg.sendData(JSON.stringify({
                action: 'leads_downloaded',
                user_id: userId,
                count: currentLeads.length,
                timestamp: new Date().toISOString()
            }));
        });

        // --- Новый поиск ---
        document.getElementById('btn-new').addEventListener('click', () => {
            showScreen('search');
            currentLeads = [];
        });

        // Инициализация времени
        document.getElementById('current-time').textContent = new Date().toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});
    </script>
</body>
</html>
